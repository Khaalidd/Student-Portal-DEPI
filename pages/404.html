<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Page Not Found</title>
    <link href="/css/bootstrap/bootstrap.css" rel="stylesheet" />
    <link href="/css/404.css" rel="stylesheet" />
    <link href="/css/global.css" rel="stylesheet" />
  </head>

  <body>
    <div class="container">
      <div
        class="row justify-content-center align-items-center text-center"
        style="min-height: 100vh"
      >
        <div class="col-md-6">
          <!-- Error Code -->
          <h1 class="error-code mb-3">404</h1>

          <!-- Title -->
          <h2 class="mb-3 fw-bold">Whoops! We can't find that page.</h2>

          <!-- Description -->
          <p class="text-muted mb-4">
            The page you are looking for might have been removed or is
            temporarily unavailable.
          </p>

          <!-- Button -->
          <a
            href="./dashboard.html"
            class="btn btn-outline-dark-blue px-5 py-2 fw-semibold"
          >
            Back to Home
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
