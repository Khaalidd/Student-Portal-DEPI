<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/assets/icons/Container.png" />
    <title>Acadex - Login</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/auth.css" />
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.css" />
  </head>
  <body>
    <div class="container-fluid vh-100">
      <div class="row h-100">
        <!--Left panel-->
        <div
          class="col-lg-6 text-white d-none d-lg-flex flex-column justify-content-center align-items-center p-5 leftside-container"
        >
          <div class="text-center">
            <div class="mb-2">
              <svg
                width="64"
                height="64"
                fill="currentColor"
                class="bi bi-mortarboard-fill"
                viewBox="0 0 16 16"
              >
                <path
                  d="M8.211 2.047a.5.5 0 0 0-.422 0l-7.5 3.5a.5.5 0 0 0 .025.917l7.5 3a.5.5 0 0 0 .372 0L14 7.14V13a1 1 0 0 0-1 1v2h3v-2a1 1 0 0 0-1-1V6.739l.686-.275a.5.5 0 0 0 .025-.917l-7.5-3.5Z"
                />
                <path
                  d="M4.176 9.032a.5.5 0 0 0-.656.327l-.5 1.7a.5.5 0 0 0 .294.605l4.5 1.8a.5.5 0 0 0 .372 0l4.5-1.8a.5.5 0 0 0 .294-.605l-.5-1.7a.5.5 0 0 0-.656-.327L8 10.466 4.176 9.032Z"
                />
              </svg>
            </div>
            <h1 class="display-4 fw-bold">Acadex</h1>
            <p class="lead mb-0">Your academic life, all in one place</p>
          </div>
        </div>

        <!--Right Panel-->
        <div
          class="col-12 col-lg-6 d-flex justify-content-center align-items-center p4 flex-column gap-4"
        >
          <div class="text-center d-block d-lg-none mb-4">
            <div class="mb-2">
              <svg
                width="40"
                height="40"
                fill="#2B5EA7"
                class="bi bi-mortarboard-fill"
                viewBox="0 0 16 16"
              >
                <path
                  d="M8.211 2.047a.5.5 0 0 0-.422 0l-7.5 3.5a.5.5 0 0 0 .025.917l7.5 3a.5.5 0 0 0 .372 0L14 7.14V13a1 1 0 0 0-1 1v2h3v-2a1 1 0 0 0-1-1V6.739l.686-.275a.5.5 0 0 0 .025-.917l-7.5-3.5Z"
                />
                <path
                  d="M4.176 9.032a.5.5 0 0 0-.656.327l-.5 1.7a.5.5 0 0 0 .294.605l4.5 1.8a.5.5 0 0 0 .372 0l4.5-1.8a.5.5 0 0 0 .294-.605l-.5-1.7a.5.5 0 0 0-.656-.327L8 10.466 4.176 9.032Z"
                />
              </svg>
            </div>
            <h1 class="fw-bold primary-color">Acadex</h1>
            <p class="mb-0 text-muted">Your academic life, all in one place</p>
          </div>
          <div
            class="card dropshadow rounded-4 border-0 w-100"
            style="max-width: 450px"
          >
            <div class="card-body p-4 p-md-5">
              <div class="mb-4 text-start border-5">
                <h2 class="fw-bold">Welcome back</h2>
                <p class="text-muted">Sign in to your account</p>
              </div>

              <form id="registerForm">
                <div class="mb-4">
                  <label for="fullname" class="form-label fw-bold spacing"
                    >EMAIL ADDRESS</label
                  >
                  <input
                    type="text"
                    id="fullname"
                    class="field"
                    placeholder="you@university.edu"
                    required
                  />
                </div>
                <div class="mb-5">
                  <div class="d-flex justify-content-between">
                    <label for="password" class="form-label fw-bold spacing"
                      >PASSWORD</label
                    >
                    <a class="m-0 fw-bold text-decoration-none primary-color"
                      >Forgot?</a
                    >
                  </div>
                  <input
                    type="password"
                    id="password"
                    class="field"
                    placeholder="Enter your password"
                    required
                  />
                </div>

                <div class="text-danger mb-3" id="formError"></div>

                <button type="submit" class="button-primary w-100 py-2">
                  Sign In
                </button>
              </form>
              <p class="auth-switch mt-5 mb-0 text-center">Don't have an account?
                <a href="/pages/register.html" class="primary-color fw-bold text-decoration-none">Register</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
